services:
  queue_app_ssr:
    build:
      context: ./queue/client
      dockerfile: Dockerfile
      target: frontend-ssr-runtime
    container_name: rmq_app_queue_ssr
    environment:
      PORT: 9010
      NODE_ENV: production
      PROD: true
      API_BASE_URL: http://rmq_app_queue:3000
    expose:
      - 9010
    ports:
      - 9010:9010
    networks:
      - app_network
    restart: unless-stopped


networks:
  app_network:
    name: ${PROJECT_NAME}_network
    driver: bridge
