# Let's Encrypt con Certbot (webroot). Al hacer `docker compose up -d`, el
# entrypoint emite el certificado la primera vez (si no existe en
# /etc/letsencrypt/live/$DOMAIN) y copia fullchain/privkey a /etc/nginx/ssl/.
#
# Requisitos en el host ANTES de levantar este servicio:
#   - DNS de DOMAIN apunta a este servidor
#   - sudo mkdir -p /var/www/certbot /etc/nginx/ssl
#   - Nginx escuchando :80 con location /.well-known/acme-challenge/ (nginx/queue_app)
#   - Si nginx usa HTTPS antes de tener LE: cert temporal en /etc/nginx/ssl
#     (scripts/bootstrap-self-signed-nginx-ssl.sh)
#
# Renovación periódica (no corre sola en el contenedor dormido):
#   ./scripts/certbot-renew.sh
#
# Cron sugerido (root): 0 3,15 * * * /ruta/al/repo/scripts/certbot-renew.sh

services:
  certbot:
    image: certbot/certbot:latest
    entrypoint: ["/bin/sh", "/certbot-entrypoint.sh"]
    environment:
      DOMAIN: inths.fundacionteapoyamos.cl
      EMAIL: admin@fundacionteapoyamos.cl
      CERTBOT_LETSENCRYPT_DIR: /etc/letsencrypt
      CERTBOT_WEBROOT: /var/www/certbot
      NGINX_SSL_DIR: /etc/nginx/ssl
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
      - /etc/nginx/ssl:/etc/nginx/ssl
      - ./scripts/certbot-entrypoint.sh:/certbot-entrypoint.sh:ro
      - ./scripts/certbot-deploy-hook.sh:/certbot-deploy-hook.sh:ro
    restart: unless-stopped
