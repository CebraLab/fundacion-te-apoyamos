# Certbot solo para ejecutar comandos (no hay servicio permanente).
# Uso desde la raíz del repo:
#   ./scripts/letsencrypt.sh bootstrap   # una vez: dirs + PEM autofirmado para nginx
#   ./scripts/letsencrypt.sh issue       # primera emisión Let's Encrypt (válidos en navegadores)
#   ./scripts/letsencrypt.sh renew       # cron: renovar y copiar PEM a nginx
#
# Requisitos: DNS al servidor, nginx con nginx/queue_app activo, puertos 80/443 abiertos.

services:
  certbot:
    image: certbot/certbot:latest
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
