# Let's Encrypt con Certbot (webroot). Al hacer `docker compose up -d`, el
# entrypoint emite el certificado la primera vez (si no existe en
# /etc/letsencrypt/live/$DOMAIN) y copia fullchain/privkey a /etc/nginx/ssl/.
#
# Requisitos en el host ANTES de levantar este servicio (flujo opción A):
#   - DNS de DOMAIN apunta a este servidor
#   - sudo ./scripts/setup-ssl-path-a.sh
#     (webroot + PEM temporales para que nginx cargue queue_app con listen 443)
#   - Nginx activo con nginx/queue_app: :80 con /.well-known/ → /var/www/certbot
#   - Alternativa: nginx/queue_app.phase1-http-only (solo :80), ver nginx/queue_app
#
# Renovación periódica (no corre sola en el contenedor dormido):
#   ./scripts/certbot-renew.sh
#
# Cron sugerido (root): 0 3,15 * * * /ruta/al/repo/scripts/certbot-renew.sh
#
# Rate limit LE: máx. ~5 fallos de validación por dominio y hora. Si certonly
# falla repetidas veces, espera el "retry after" del mensaje de error.
# Pruebas sin tocar el límite de producción: CERTBOT_STAGING=1

services:
  certbot:
    image: certbot/certbot:latest
    entrypoint: ["/bin/sh", "/certbot-entrypoint.sh"]
    environment:
      DOMAIN: inths.fundacionteapoyamos.cl
      EMAIL: admin@fundacionteapoyamos.cl
      CERTBOT_LETSENCRYPT_DIR: /etc/letsencrypt
      CERTBOT_WEBROOT: /var/www/certbot
      NGINX_SSL_DIR: /etc/nginx/ssl
      # 1 = Let's Encrypt staging (pruebas; certificados no confían los navegadores)
      CERTBOT_STAGING: "0"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
      - /etc/nginx/ssl:/etc/nginx/ssl
      - ./scripts/certbot-entrypoint.sh:/certbot-entrypoint.sh:ro
      - ./scripts/certbot-deploy-hook.sh:/certbot-deploy-hook.sh:ro
    # Sin reinicio agresivo: si certonly falla, el entrypoint hace sleep infinity
    # y no debe reintentar en bucle (rate limits).
    restart: unless-stopped
